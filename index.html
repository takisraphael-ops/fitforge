<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="description" content="FitForge — an offline-first workout and nutrition tracker" />
  <title>FitForge — Offline Fitness Tracker</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./css/styles.css?v=101" />
</head>
<body>
  <!-- Launch splash — orbit mark, plays once per load then fades into the app -->
  <div id="splash" class="splash" role="presentation" aria-hidden="true">
    <div class="splash-mark">
      <span class="s-ring s-ring-1"></span>
      <span class="s-ring s-ring-2"></span>
      <span class="s-ring s-ring-3"></span>
      <span class="s-core"></span>
    </div>
    <div class="splash-word">FitForge</div>
    <div class="splash-tag">MOVE · FUEL · RECOVER</div>
    <div class="splash-load"><i></i></div>
  </div>
  <script>
    (function () {
      var s = document.getElementById("splash");
      if (!s) return;
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var hold = reduce ? 300 : 3500;
      var t;
      function done() {
        clearTimeout(t);
        s.classList.add("splash-done");
        setTimeout(function () { if (s.parentNode) s.parentNode.removeChild(s); }, 650);
      }
      t = setTimeout(done, hold);
      s.addEventListener("click", done);
    })();
  </script>

  <div class="app">
    <header id="header" class="header"></header>
    <main id="main"></main>
  </div>
  <!-- Cache-bust query so PWA clients cannot stick on old JS -->
  <script src="./data/exercises.js?v=101"></script>
  <script src="./data/meals.js?v=101"></script>
  <script src="./js/meal-search.js?v=101"></script>
  <script src="./js/utils.js?v=101"></script>
  <script src="./js/storage.js?v=101"></script>
  <script src="./js/body-map.js?v=101"></script>
  <script src="./js/app.js?v=101"></script>
</body>
</html>
